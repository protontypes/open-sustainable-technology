name: PR Project Review - Post Comment

on:
  workflow_run:
    workflows: ["PR Project Review - Fetch Data"]
    types: [completed]

permissions:
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: pr-review
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f comment.md ] || [ ! -s comment.md ]; then
            echo "No comment to post"
            exit 0
          fi
          PR_NUMBER=$(cat pr_number.txt)
          COMMENT=$(cat comment.md)
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "$COMMENT"
